#cloud-config
autoinstall:
    version: 2
    locale: pt_BR.UTF-8
    timezone: America/Sao_Paulo

    keyboard:
        layout: br

    packages:
        - build-essential
        - ca-certificates
        - curl
        - dash
        - flameshot
        - git
        - git-lfs
        - gnome-clocks
        - gnome-shell-extension-manager
        - gnome-shell-extensions
        - gnome-tweaks
        - gnome-weather
        - gnupg
        - htop
        - jq
        - kdenlive
        - make
        - nodejs
        - python3-pip
        - python3-venv
        - remmina
        - snapd
        - software-properties-common
        - tilix
        - tree
        - unzip
        - vim
        - wget
        - whois
        - zsh

    snaps:
        - name: brave
        - name: dbeaver-ce
        - name: discord
        - name: postman

    identity:
        realname: "Username"
        username: user
        password: $y$j9T$FnwitrYOiBEcaMok75FIs.$3XxOYKBAHRyid5X7gMtwCevTrkpUHSYgdmNeCTI/kE6
        hostname: computer

    storage:
        layout:
            name: direct

    early-commands:
        - echo 'linux-generic-hwe-24.04' > /run/kernel-meta-package

    late-commands:

        # Boot splash
        - curtin in-target -- sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT=.*/GRUB_CMDLINE_LINUX_DEFAULT="quiet splash"/' /etc/default/grub
        - curtin in-target -- update-grub
        - curtin in-target -- update-initramfs -u

        # NetworkManager
        - rm /target/etc/netplan/00-installer-config*yaml
        - >-
          printf "network:\n  version: 2\n  renderer: NetworkManager\n"
          > /target/etc/netplan/01-network-manager-all.yaml

        # Remove server-related packages
        - >-
          curtin in-target -- apt-get remove -y
          btrfs-progs cryptsetup* lvm2 xfsprogs

        - >-
          curtin in-target -- apt-get remove -y
          ubuntu-server ubuntu-server-minimal
          byobu dmeventd finalrd gawk kpartx mdadm
          ncurses-term needrestart open-iscsi
          openssh-server sg3-utils ssh-import-id
          sssd thin-provisioning-tools tmux
          sosreport screen open-vm-tools
          motd-news-config lxd-agent-loader
          landscape-common fonts-ubuntu-console
          ethtool

        # Keep cloud-init
        - curtin in-target -- apt-get install -y cloud-init

        # Cleanup
        - curtin in-target -- apt-get autoremove -y

        # ==================================================
        # My Configs
        # ==================================================

        # Remove stock games
        - curtin in-target -- apt purge -y aisleriot gnome-mahjongg gnome-mines

        # External DEBs
        - curtin in-target -- dash -c "wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -O /tmp/google-chrome.deb"

        - curtin in-target -- dash -c "wget -q -O /tmp/vscode.deb 'https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64'"

        - curtin in-target -- apt install -y \
          /tmp/google-chrome.deb \
          /tmp/vscode.deb

        # Deadsnakes Python
        - curtin in-target -- add-apt-repository -y ppa:deadsnakes/ppa
        - curtin in-target -- apt update

        - >-
          curtin in-target -- bash -c
          "apt install -y python3.10 python3.12 python3.14 || true"

        # Cloudflare WARP
        - >-
          curtin in-target -- bash -c
          "curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg |
          gpg --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg"

        - >-
          curtin in-target -- bash -c
          "echo 'deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg]
          https://pkg.cloudflareclient.com/ noble main'
          > /etc/apt/sources.list.d/cloudflare-client.list"

        - curtin in-target -- apt update
        - curtin in-target -- apt install -y cloudflare-warp

        # Oh My Zsh
        - >-
          curtin in-target -- sudo -u user sh -c
          "$(curl -fsSL
          https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
          "" --unattended

        - >-
          curtin in-target -- sed -i
          's/^ZSH_THEME=.*/ZSH_THEME="bira"/'
          /home/user/.zshrc

        - curtin in-target -- chsh -s /usr/bin/zsh user

        # ==================================================
        # GNOME Custom Shortcuts
        # ==================================================

        - >-
          curtin in-target -- sudo -u user dbus-run-session
          gsettings set
          org.gnome.settings-daemon.plugins.media-keys
          custom-keybindings
          "[
          '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/',
          '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom1/',
          '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom2/',
          '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom3/',
          '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom4/'
          ]"

        # Files
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/ name 'Files'
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/ command 'nautilus'
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/ binding '<Super>e'

        # Tilix
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom1/ name 'Tilix'
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom1/ command 'tilix'
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom1/ binding '<Control><Alt><Super>t'

        # WARP ON
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom2/ name 'Cloudflare VPN On'
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom2/ command 'warp-cli connect'
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom2/ binding '<Control><Alt>v'

        # WARP OFF
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom3/ name 'Cloudflare VPN Off'
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom3/ command 'warp-cli disconnect'
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom3/ binding '<Control><Alt><Shift>v'

        # Flameshot
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom4/ name 'Flameshot'
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom4/ command 'flameshot gui'
        - curtin in-target -- sudo -u user dbus-run-session gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybindings:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom4/ binding '<Super>Print'

        # Final cleanup
        - curtin in-target -- apt update
        - curtin in-target -- apt upgrade -y
        - curtin in-target -- apt autoremove -y
        - curtin in-target -- apt autoclean -y

    shutdown: reboot