#cloud-config
autoinstall:
version: 1

locale: pt_BR.UTF-8
timezone: America/Sao_Paulo

keyboard:
layout: br

identity:
realname: "Username"
username: user
hostname: computer
password: $y$j9T$FnwitrYOiBEcaMok75FIs.$3XxOYKBAHRyid5X7gMtwCevTrkpUHSYgdmNeCTI/kE6

storage:
layout:
name: direct

early-commands:
- echo 'linux-generic-hwe-24.04' > /run/kernel-meta-package

packages:
- ubuntu-desktop
- curl
- wget
- git
- git-lfs
- vim
- zsh
- tilix
- flameshot
- htop
- tree
- unzip
- zip
- ripgrep
- fd-find
- bat
- fzf
- jq
- build-essential
- make
- gpg
- software-properties-common
- python3-pip
- python3-venv
- openssh-server
- remmina
- default-jdk
- postgresql
- postgresql-contrib
- yt-dlp
- neofetch
- gnome-tweaks
- gnome-shell-extension-manager
- gnome-shell-extensions

snaps:
- name: firefox
- name: snap-store
- name: dbeaver-ce
- name: discord
- name: postman
- name: onlyoffice-desktopeditors

late-commands:

```
# =========================
# GRUB
# =========================
- curtin in-target -- sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT=.*/GRUB_CMDLINE_LINUX_DEFAULT="quiet splash"/' /etc/default/grub
- curtin in-target -- update-grub

# =========================
# NetworkManager
# =========================
- rm -f /target/etc/netplan/00-installer-config*.yaml
- |
  printf "network:\n  version: 2\n  renderer: NetworkManager\n" \
  > /target/etc/netplan/01-network-manager-all.yaml

# =========================
# Limpeza básica
# =========================
- curtin in-target -- apt autoremove -y
- curtin in-target -- apt autoclean -y

# =========================
# Remover jogos GNOME
# =========================
- curtin in-target -- bash -c "apt purge -y aisleriot gnome-mahjongg gnome-mines gnome-sudoku && apt autoremove -y"

# =========================
# Google Chrome
# =========================
- curtin in-target -- bash -c "wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -O /tmp/chrome.deb"
- curtin in-target -- apt install -y /tmp/chrome.deb

# =========================
# VSCode
# =========================
- curtin in-target -- bash -c "wget -q 'https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64' -O /tmp/vscode.deb"
- curtin in-target -- apt install -y /tmp/vscode.deb

# =========================
# Deadsnakes PPA
# =========================
- curtin in-target -- add-apt-repository -y ppa:deadsnakes/ppa
- curtin in-target -- apt update
- curtin in-target -- apt install -y python3.10 python3.13

# =========================
# NVIDIA Drivers
# =========================
- curtin in-target -- apt install -y ubuntu-drivers-common
- curtin in-target -- ubuntu-drivers autoinstall

# =========================
# Cloudflare WARP
# =========================
- curtin in-target -- bash -c "curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | gpg --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg"

- curtin in-target -- bash -c "echo 'deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ noble main' > /etc/apt/sources.list.d/cloudflare-client.list"

- curtin in-target -- apt update
- curtin in-target -- apt install -y cloudflare-warp

# =========================
# Oh My Zsh
# =========================
- curtin in-target -- sudo -u user sh -c "RUNZSH=no CHSH=no KEEP_ZSHRC=yes $(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"

- curtin in-target -- sed -i 's/^ZSH_THEME=.*/ZSH_THEME="bira"/' /home/user/.zshrc

- curtin in-target -- chsh -s /usr/bin/zsh user

# =========================
# Diretórios úteis
# =========================
- curtin in-target -- sudo -u user mkdir -p /home/user/Projects
- curtin in-target -- sudo -u user mkdir -p /home/user/Scripts

# =========================
# Atualização final
# =========================
- curtin in-target -- apt update
- curtin in-target -- apt upgrade -y
- curtin in-target -- apt autoremove -y
- curtin in-target -- apt autoclean -y
```

shutdown: reboot
